exchange:
  name: "binance"
  testnet: false
  rest_timeout_secs: 10
  ws_reconnect_max_attempts: 10

# Secondary exchange — optional, enables cross-exchange arbitrage.
# Keys are provided via BYBIT_API_KEY / BYBIT_SECRET_KEY env vars.
bybit:
  testnet: false
  rest_timeout_secs: 10

strategy:
  active: "grid"  # "grid" | "arbitrage"

grid:
  symbol: "BTCUSDT"
  quote_asset: "USDT"
  base_asset: "BTC"
  grid_bottom: 80000.0
  grid_top: 100000.0
  grid_count: 20
  total_investment: 1000.0
  fee_rate: 0.001

risk:
  max_position_usdt: 1100.0
  stop_loss_pct: 5.0
  max_drawdown_pct: 15.0
  max_open_orders: 50
  order_cooldown_secs: 1
  cancel_on_stop: false

backtest:
  data_dir: "./data"
  symbol: "BTCUSDT"
  interval: "1h"
  start_date: "2024-01-01"
  end_date: "2024-12-31"
  initial_balance_usdt: 10000.0
  fee_rate: 0.001

logging:
  level: "info"
  format: "json"
  output_path: "stdout"
  error_output_path: "stderr"

state:
  dir: "./state"
  flush_interval_secs: 30

# Arbitrage strategy configuration.
# Set strategy.active: "arbitrage" to enable.
arbitrage:
  type: "triangular"              # "triangular" | "cross_exchange" | "both"
  quote_assets: ["USDT"]         # base currencies for triangles
  intermediate_assets: ["BTC", "ETH", "BNB", "SOL"]
  max_hops: 3                    # 3 = triangular, 4 = quad-arb
  min_profit_pct: 0.15           # minimum net profit % after all fees
  max_trade_usdt: 500.0          # maximum USDT per arbitrage cycle
  fee_rate: 0.001                # taker fee (0.1% on Binance/Bybit)
  scan_interval_ms: 200          # price poll interval in milliseconds
  order_timeout_secs: 5          # per-leg order execution timeout
  dry_run: true                  # log opportunities without executing (start here)
